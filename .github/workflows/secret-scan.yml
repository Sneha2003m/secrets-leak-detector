name: Secrets Leak Detection

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  secrets-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Send Slack Alert on Leak
        if: steps.gitleaks.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "SECRET LEAK DETECTED in ${{ github.repository }} by ${{ github.actor }} on branch ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Fail pipeline if secrets found
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Secrets detected! Pipeline failed."
          exit 1

      - name: Success
        if: steps.gitleaks.outcome == 'success'
        run: echo "No secrets found. Safe to merge!"
